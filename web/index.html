<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoLocate AR</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Google Maps API with Places Library -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA__siSLLO_ZoKdi-h8VIBifnDWnzgeKho&libraries=places&v=beta"></script>

    <!-- A-Frame and AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .ui-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            background: white;
            color: #333;
            padding: 20px;
            border-radius: 25px;
            z-index: 9999;
            text-align: left;
            max-height: 70vh;
            overflow-y: auto;
            box-shadow: 0 -5px 25px rgba(0,0,0,0.2);
            display: none; /* Hidden until a place is clicked */
        }
        .radius-control {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 10px;
            z-index: 1000;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        .photo-grid img { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; }
        .rating { color: #fbbc04; font-weight: bold; }
        .close-btn { float: right; cursor: pointer; font-size: 1.5em; color: #999; }
        h3 { margin: 0 0 5px 0; font-size: 1.4em; }
        .category { color: #666; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="radius-control">
        <label>Radius: <span id="radius-text">5</span> km</label>
        <input type="range" id="radius-slider" min="1" max="50" value="5">
    </div>

    <div class="ui-panel">
        <div id="info" class="location-details">Point your camera around...</div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">

        <a-camera gps-camera rotation-reader></a-camera>
        
        <!-- Locations will be injected here via JavaScript -->
    </a-scene>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
