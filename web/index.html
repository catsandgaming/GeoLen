<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoLocate AR</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Google Maps API with Places Library -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA__siSLLO_ZoKdi-h8VIBifnDWnzgeKho&libraries=places&v=beta"></script>

    <!-- A-Frame and AR.js -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .ui-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            z-index: 9999;
            text-align: center;
            max-height: 70vh;
            overflow-y: auto;
            transition: max-height 0.3s ease-in-out;
        }
        input[type=range] { width: 100%; margin: 10px 0; }
        .location-details { font-size: 0.9em; text-align: left; }
        .place-photo { width: 100%; border-radius: 10px; margin: 10px 0; }
        .rating { color: #fbbc04; font-weight: bold; }
        .review { border-top: 1px solid #444; padding: 5px 0; margin-top: 5px; font-size: 0.85em; }
        .close-btn { float: right; cursor: pointer; font-size: 1.5em; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <div id="info" class="location-details">Point your camera around...</div>
        <label>Radius: <span id="radius-text">5</span> km</label>
        <input type="range" id="radius-slider" min="1" max="50" value="5">
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; videoTexture: true;">
        
        <a-camera gps-camera rotation-reader></a-camera>
        
        <!-- Locations will be injected here via JavaScript -->
    </a-scene>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
